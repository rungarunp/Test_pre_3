<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brainy ABC Pro</title>

<style>
body{margin:0;font-family:sans-serif;background:#111;color:#fff;text-align:center;}
.screen{display:none;padding:20px;}
.active{display:block;}

button{padding:10px 18px;margin:8px;font-size:18px;border-radius:10px;border:none;}
.card{display:inline-block;margin:10px;padding:20px;background:#333;border-radius:12px;font-size:26px;cursor:pointer;}

.correct{background:#4caf50;}
.wrong{background:#f44336;}
#mic{font-size:22px;padding:10px 20px;background:#2196f3;color:#fff;border-radius:10px;}
</style>
</head>

<body onclick="initAudio()" ontouchstart="initAudio()">

<!-- MENU -->
<div id="menu" class="screen active">
<h2>🧠 Brainy ABC Pro</h2>
<button onclick="go('map')">▶ Start</button>
</div>

<!-- MAP -->
<div id="map" class="screen">
<h2>🌍 Level Map</h2>
<div id="levels"></div>
<p>XP: <span id="xp">0</span></p>
<button onclick="go('menu')">⬅ Back</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
<h2 id="question"></h2>
<button id="mic" onclick="startVoice()">🎤 Speak</button>
<div id="grid"></div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
<h2 id="resultText"></h2>
<button onclick="nextLevel()">➡ Next</button>
</div>

<script>

// ===== DATA (เพิ่มได้เรื่อย ๆ) =====
const DATA = [
{l:"A",w:"apple",e:"🍎"},
{l:"B",w:"ball",e:"⚽"},
{l:"C",w:"cat",e:"🐱"},
{l:"D",w:"dog",e:"🐶"},
{l:"E",w:"egg",e:"🥚"},
{l:"F",w:"fish",e:"🐟"},
{l:"G",w:"grapes",e:"🍇"},
{l:"H",w:"hat",e:"🎩"},
{l:"I",w:"ice cream",e:"🍦"},
{l:"J",w:"juice",e:"🧃"}
];

// ===== STATE =====
let state = {
  level: load("level") || 1,
  xp: load("xp") || 0
};

let currentWord = "";

// ===== STORAGE =====
function save(){
  localStorage.setItem("level", state.level);
  localStorage.setItem("xp", state.xp);
}
function load(k){
  return parseInt(localStorage.getItem(k));
}

// ===== AUDIO =====
let ctx=new (window.AudioContext||window.webkitAudioContext)();
function initAudio(){ if(ctx.state==="suspended") ctx.resume(); }

function speak(t){
  speechSynthesis.cancel();
  let u=new SpeechSynthesisUtterance(t);
  u.lang="en-US";
  speechSynthesis.speak(u);
}

// ===== NAV =====
function go(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if(id==="map") renderMap();
}

// ===== MAP =====
function renderMap(){
  let el=document.getElementById("levels");
  el.innerHTML="";
  document.getElementById("xp").innerText=state.xp;

  for(let i=1;i<=10;i++){
    let b=document.createElement("button");
    b.innerText="Level "+i;
    b.onclick=()=>startGame(i);
    el.appendChild(b);
  }
}

// ===== GAME =====
function startGame(lv){
  state.level = lv;
  go("game");




  // สุ่มคำถาม
let q = DATA[Math.floor(Math.random()*DATA.length)];
currentWord = q.w;

  document.getElementById("question").innerText = "Say or Find: " + q.w;
  speak(q.w);

// เอาคำตอบใส่ก่อน
let choices = [q];

// เอาตัวอื่นมาเติม
let others = DATA.filter(x => x.w !== q.w);
shuffle(others);

choices = choices.concat(others.slice(0,3));

// สุ่มตำแหน่งอีกที
shuffle(choices);


  let grid=document.getElementById("grid");
  grid.innerHTML="";

  choices.forEach(c=>{
    let d=document.createElement("div");
    d.className="card";
    d.innerText=c.e;

    d.onclick=()=>{
      if(c.w === currentWord){
        correct();
      }else{
        wrong(d);
      }
    };

    grid.appendChild(d);
  });
}

// ===== VOICE AI =====
function startVoice(){
  if(!('webkitSpeechRecognition' in window)){
    alert("ใช้ Chrome เท่านั้น");
    return;
  }

  let rec = new webkitSpeechRecognition();
  rec.lang = "en-US";

  rec.onresult = e=>{
    let text = e.results[0][0].transcript.toLowerCase();
    console.log("พูด:", text);

    if(text.includes(currentWord)){
      correct();
    }else{
      alert("ลองใหม่: " + text);
    }
  };

  rec.start();
}

// ===== RESULT =====
function correct(){
  state.xp += 10;
  save();
  speak("great");
  showResult(true);
}

function wrong(el){
  el.classList.add("wrong");
  speak("try again");
}

function showResult(win){
  go("result");
  document.getElementById("resultText").innerText = win ? "🎉 Correct!" : "❌";
}

// ===== NEXT =====
function nextLevel(){
  state.level++;
  save();
  startGame(state.level);
}

// ===== UTILS =====
function shuffle(a){ return a.sort(()=>Math.random()-0.5); }

</script>

</body>
</html>
