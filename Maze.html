<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maze Game</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#f0f0f0;
}

#maze{
display:grid;
justify-content:center;
margin:20px auto;
}

.cell{
width:42px;
height:42px;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
}

.wall{background:#333;}
.path{background:white;}
.player{background:#6edb75;}
.goal{background:#ffd966;}

.controls{
margin-top:10px;
}

.controls button{
font-size:30px;
width:80px;
height:80px;
margin:5px;
border-radius:15px;
border:none;
background:#4CAF50;
color:white;
}

.controls button:active{
background:#2e7d32;
}

.newBtn{
margin-top:10px;
font-size:18px;
padding:10px 20px;
}

</style>
</head>

<body>

<h2>🧩 เกมแก้เขาวงกต</h2>
<p>พา 😀 ไปหา 🎁</p>

<div id="maze"></div>

<div class="controls">

<div>
<button ontouchstart="move(-1,0)">⬆</button>
</div>

<div>
<button ontouchstart="move(0,-1)">⬅</button>
<button ontouchstart="move(1,0)">⬇</button>
<button ontouchstart="move(0,1)">➡</button>
</div>

</div>

<button class="newBtn" onclick="generateMaze()">🎲 สร้างเขาวงกตใหม่</button>

<script>

let size=9
let maze=[]
let player={x:1,y:1}

function generateMaze(){

maze=[]

for(let i=0;i<size;i++){

maze[i]=[]

for(let j=0;j<size;j++){

if(i===0||j===0||i===size-1||j===size-1)
maze[i][j]=1
else
maze[i][j]=(Math.random()<0.3)?1:0

}

}

maze[1][1]=0
maze[size-2][size-2]=2

player={x:1,y:1}

drawMaze()

}

function drawMaze(){

const mazeDiv=document.getElementById("maze")
mazeDiv.style.gridTemplateColumns=`repeat(${size},42px)`
mazeDiv.innerHTML=""

for(let i=0;i<size;i++){

for(let j=0;j<size;j++){

const cell=document.createElement("div")
cell.classList.add("cell")

if(maze[i][j]===1) cell.classList.add("wall")
else cell.classList.add("path")

if(maze[i][j]===2){
cell.classList.add("goal")
cell.innerHTML="🎁"
}

if(player.x===i && player.y===j){
cell.classList.add("player")
cell.innerHTML="😀"
}

mazeDiv.appendChild(cell)

}

}

}

function move(dx,dy){

let nx=player.x+dx
let ny=player.y+dy

if(maze[nx][ny]===1) return

player.x=nx
player.y=ny

if(maze[nx][ny]===2){

setTimeout(()=>{
alert("🎉 เก่งมาก!")
generateMaze()
},100)

}

drawMaze()

}

document.addEventListener("keydown",(e)=>{

if(e.key==="ArrowUp") move(-1,0)
if(e.key==="ArrowDown") move(1,0)
if(e.key==="ArrowLeft") move(0,-1)
if(e.key==="ArrowRight") move(0,1)

})

generateMaze()

</script>

</body>
</html>
