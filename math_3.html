<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Math Level 1 OCR</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<style>
body { font-family: Arial; text-align: center; background:#f4f9ff; }
canvas { border:3px solid #0077cc; background:white; touch-action:none; }
button { padding:10px; margin:5px; font-size:16px; }
#question { font-size:28px; margin:20px; font-weight:bold; }
#timer { color:red; font-size:20px; }
#score { font-size:20px; }
</style>
</head>
<body>

<h1>Level 1 OCR ✍️</h1>
<div id="timer">⏰ เวลา: 60</div>
<div id="score">คะแนน: 0</div>
<div id="question">กดเริ่ม</div>

<button onclick="startGame()">เริ่ม</button>
<button onclick="checkOCR()">ตรวจลายมือ</button>
<button onclick="clearCanvas()">ล้าง</button>

<br><br>
<canvas id="canvas" width="500" height="300"></canvas>

<audio id="timeoutSound">
<source src="https://www.soundjay.com/button/beep-07.wav" type="audio/wav">
</audio>

<script>
let correctAnswer;
let score = 0;
let timeLeft = 60;
let timer;

function startGame(){
    score=0;
    timeLeft=60;
    document.getElementById("score").innerText="คะแนน: "+score;
    document.getElementById("timer").innerText="⏰ เวลา: "+timeLeft;
    generateQuestion();
    clearInterval(timer);
    timer=setInterval(()=>{
        timeLeft--;
        document.getElementById("timer").innerText="⏰ เวลา: "+timeLeft;
        if(timeLeft<=0){
            clearInterval(timer);
            document.getElementById("timeoutSound").play();
            alert("หมดเวลา คะแนนรวม: "+score);
        }
    },1000);
}

function generateQuestion(){
    clearCanvas();
    let type=Math.floor(Math.random()*4);
    let a=Math.floor(Math.random()*20);
    let b=Math.floor(Math.random()*20);

    if(type===0){
        correctAnswer=(a+b).toString();
        document.getElementById("question").innerText=a+" + "+b+" = ?";
    }
    else if(type===1){
        if(a<b)[a,b]=[b,a];
        correctAnswer=(a-b).toString();
        document.getElementById("question").innerText=a+" - "+b+" = ?";
    }
    else if(type===2){
        correctAnswer=a>b?">":a<b?"<":"=";
        document.getElementById("question").innerText=
        "ใส่ > < = : "+a+" ? "+b;
    }
    else{
        let nums=[];
        for(let i=0;i<3;i++) nums.push(Math.floor(Math.random()*20));
        correctAnswer=[...nums].sort((x,y)=>x-y).join(",");
        document.getElementById("question").innerText=
        "เรียงจากน้อย→มาก: "+nums.join(",");
    }
}

async function checkOCR(){
    const canvas=document.getElementById("canvas");
    const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
    let result=text.replace(/\s/g,'').trim();

    alert("OCR อ่านได้: "+result);

    if(result==correctAnswer){
        score++;
        document.getElementById("score").innerText="คะแนน: "+score;
        alert("ถูกต้อง 🎉");
        generateQuestion();
    }else{
        alert("ยังไม่ถูก ลองเขียนใหม่ชัด ๆ 💪");
    }
}

let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");
let drawing=false;

canvas.addEventListener("pointerdown",e=>{
    drawing=true;
    ctx.beginPath();
    ctx.moveTo(e.offsetX,e.offsetY);
});

canvas.addEventListener("pointermove",e=>{
    if(!drawing)return;
    ctx.lineTo(e.offsetX,e.offsetY);
    ctx.stroke();
});

canvas.addEventListener("pointerup",()=>drawing=false);

function clearCanvas(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
}
</script>

</body>
</html>
