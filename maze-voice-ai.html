<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice AI Maze</title>

<style>
body{font-family:sans-serif;text-align:center;background:#f5f5f5;}
#maze{display:grid;justify-content:center;margin:16px auto;gap:2px;}
.cell{width:36px;height:36px;background:#fff;position:relative;}
.wall{background:#333;}
.goal{background:#ffd966;}
.player{
  position:absolute;width:26px;height:26px;border-radius:50%;
  background:#4CAF50;top:5px;left:5px;transition:all .18s linear;
  display:flex;align-items:center;justify-content:center;color:#fff;
}
#status{font-size:18px;margin-top:6px;}
#hint{font-size:14px;color:#666;}
.controls{margin:10px;}
button, select{font-size:15px;padding:6px 10px;margin:4px;}
</style>
</head>

<body>

<h3>🎤 Voice AI Maze</h3>
<p>พูด: <b>go up / go down / go left / go right</b></p>

<div class="controls">
  🔢 ขนาด:
  <select id="sizeSelect" onchange="changeSize()">
    <option value="7">7 x 7</option>
    <option value="11" selected>11 x 11</option>
    <option value="15">15 x 15</option>
    <option value="21">21 x 21</option>
  </select>

  <button onclick="generateMaze()">🎲 New Maze</button>
  <button onclick="restartListening()">🎤 Restart Mic</button>
</div>

<div class="controls">
  🔊 ตัวอย่างคำสั่ง:
  <button onclick="speak('go up')">Up</button>
  <button onclick="speak('go down')">Down</button>
  <button onclick="speak('go left')">Left</button>
  <button onclick="speak('go right')">Right</button>
</div>

<div id="maze"></div>

<div id="status">Listening...</div>
<div id="hint"></div>

<script>
// ===== Config =====
let size=11, maze=[], player={x:1,y:1};

// ===== Change Size =====
function changeSize(){
  size = parseInt(document.getElementById("sizeSelect").value);
  generateMaze();
}

// ===== Maze Generator (DFS) =====
function generateMaze(){
  maze=[];
  for(let i=0;i<size;i++){
    maze[i]=[];
    for(let j=0;j<size;j++) maze[i][j]=1;
  }

  const shuffle=a=>a.sort(()=>Math.random()-0.5);

  function carve(x,y){
    maze[x][y]=0;
    for(const [dx,dy] of shuffle([[2,0],[-2,0],[0,2],[0,-2]])){
      const nx=x+dx, ny=y+dy;
      if(nx>0&&ny>0&&nx<size-1&&ny<size-1&&maze[nx][ny]===1){
        maze[x+dx/2][y+dy/2]=0;
        carve(nx,ny);
      }
    }
  }

  carve(1,1);
  maze[size-2][size-2]=2;
  player={x:1,y:1};
  drawMaze();
}

// ===== Draw =====
function drawMaze(){
  const el=document.getElementById("maze");
  el.style.gridTemplateColumns=`repeat(${size},36px)`;
  el.innerHTML="";

  for(let i=0;i<size;i++){
    for(let j=0;j<size;j++){
      const c=document.createElement("div");
      c.className="cell";
      if(maze[i][j]===1) c.classList.add("wall");
      if(maze[i][j]===2){ c.classList.add("goal"); c.innerHTML="🎁"; }
      c.id=`c-${i}-${j}`;
      el.appendChild(c);
    }
  }
  drawPlayer();
}

function drawPlayer(){
  document.querySelectorAll(".player").forEach(p=>p.remove());
  const cell=document.getElementById(`c-${player.x}-${player.y}`);
  const p=document.createElement("div");
  p.className="player";
  p.textContent="😀";
  cell.appendChild(p);
}

// ===== Move =====
function move(dx,dy){
  const nx=player.x+dx, ny=player.y+dy;
  if(maze[nx][ny]===1) return;
  player.x=nx; player.y=ny;
  drawPlayer();

  if(maze[nx][ny]===2){
    setTimeout(()=>{
      speak("Great job!");
      alert("🎉 You win!");
      generateMaze();
    },150);
  }
}

// ===== Voice =====
let recognition;

function initVoice(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    document.getElementById("status").innerText="❌ ไม่รองรับเสียง";
    return;
  }

  recognition = new SR();
  recognition.lang = "en-US";
  recognition.continuous = true;

  recognition.onresult = (e)=>{
    const text = e.results[e.results.length-1][0].transcript.toLowerCase();
    document.getElementById("status").innerText="You said: "+text;

    const cmd = parseCommand(text);
    if(cmd.ok){
      speak(cmd.canonical);
      run(cmd.canonical);
      document.getElementById("hint").innerText="";
    }else{
      const s = bestMatch(text, COMMANDS);
      document.getElementById("hint").innerText = s ? `ลองพูด: ${s}` : "ลองใหม่";
      if(s) speak("Try " + s);
    }
  };

  recognition.onend = ()=>{ try{recognition.start();}catch(e){} };
  recognition.onerror = ()=>{ try{recognition.start();}catch(e){} };

  try{ recognition.start(); }catch(e){}
}

function restartListening(){
  try{ recognition.stop(); }catch(e){}
  setTimeout(()=>initVoice(),200);
}

// ===== Command =====
const COMMANDS=["go up","go down","go left","go right"];

function parseCommand(t){
  t=t.toLowerCase();
  if(t.includes("up")) return {ok:true,canonical:"go up"};
  if(t.includes("down")) return {ok:true,canonical:"go down"};
  if(t.includes("left")) return {ok:true,canonical:"go left"};
  if(t.includes("right")) return {ok:true,canonical:"go right"};
  return {ok:false};
}

function run(cmd){
  if(cmd==="go up") move(-1,0);
  if(cmd==="go down") move(1,0);
  if(cmd==="go left") move(0,-1);
  if(cmd==="go right") move(0,1);
}

// ===== Fuzzy =====
function distance(a,b){
  const dp=Array.from({length:a.length+1},()=>Array(b.length+1).fill(0));
  for(let i=0;i<=a.length;i++) dp[i][0]=i;
  for(let j=0;j<=b.length;j++) dp[0][j]=j;

  for(let i=1;i<=a.length;i++){
    for(let j=1;j<=b.length;j++){
      dp[i][j]=Math.min(
        dp[i-1][j]+1,
        dp[i][j-1]+1,
        dp[i-1][j-1]+(a[i-1]===b[j-1]?0:1)
      );
    }
  }
  return dp[a.length][b.length];
}

function bestMatch(t,list){
  let best=null,score=999;
  for(const c of list){
    const d=distance(t,c);
    if(d<score){score=d;best=c;}
  }
  return score<=3?best:null;
}

// ===== TTS =====
function speak(text){
  const u=new SpeechSynthesisUtterance(text);
  u.lang="en-US";
  u.rate=0.9;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

// ===== Init =====
generateMaze();
initVoice();
</script>

</body>
</html>
