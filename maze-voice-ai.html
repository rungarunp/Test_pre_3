<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice AI Maze PRO</title>

<style>
body{font-family:sans-serif;text-align:center;background:#111;color:#fff;}
#maze{
  display:grid;justify-content:center;margin:16px auto;gap:2px;
  touch-action:manipulation;
}
.cell{width:34px;height:34px;background:#222;position:relative;}
.wall{background:#000;}
.goal{background:#ffcc00;}
.player{
  position:absolute;width:26px;height:26px;border-radius:50%;
  background:#00e676;top:4px;left:4px;
  transition:all .15s cubic-bezier(.25,.8,.25,1);
  display:flex;align-items:center;justify-content:center;
}
.controls{margin:8px;}
button,select{padding:6px 10px;margin:4px;font-size:14px;}
#status{font-size:14px;color:#aaa;}
#hint{font-size:13px;color:#ff8888;}
</style>
</head>

<body>

<h3>🎮 Voice AI Maze PRO</h3>

<div class="controls">
<select id="sizeSelect" onchange="changeSize()">
<option value="9">9x9</option>
<option value="13" selected>13x13</option>
<option value="17">17x17</option>
</select>
<button onclick="generateMaze()">🎲 New</button>
<button onclick="unlockAudio()">🔊 Enable Sound</button>
</div>

<div class="controls">
<button onclick="speak('go up')">⬆️</button>
<button onclick="speak('go down')">⬇️</button>
<button onclick="speak('go left')">⬅️</button>
<button onclick="speak('go right')">➡️</button>
</div>

<div id="maze"></div>

<div id="status">Listening...</div>
<div id="hint"></div>

<script>
// ===== Config =====
let size=13, maze=[], player={x:1,y:1};
let moveQueue=[]; let moving=false;

// ===== Audio (Game Sound) =====
let audioCtx;
function unlockAudio(){
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
}

function beep(freq=500,duration=80){
  if(!audioCtx) return;
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.value=freq;
  o.start();
  g.gain.setValueAtTime(0.1,audioCtx.currentTime);
  o.stop(audioCtx.currentTime+duration/1000);
}

function soundMove(){ beep(600,50); }
function soundHit(){ beep(150,120); }
function soundWin(){ beep(900,200); setTimeout(()=>beep(1200,200),200); }

// ===== Maze =====
function changeSize(){
  size=parseInt(sizeSelect.value);
  generateMaze();
}

function generateMaze(){
  maze=[];
  for(let i=0;i<size;i++){
    maze[i]=[];
    for(let j=0;j<size;j++) maze[i][j]=1;
  }

  const shuffle=a=>a.sort(()=>Math.random()-0.5);

  function carve(x,y){
    maze[x][y]=0;
    for(const [dx,dy] of shuffle([[2,0],[-2,0],[0,2],[0,-2]])){
      const nx=x+dx, ny=y+dy;
      if(nx>0&&ny>0&&nx<size-1&&ny<size-1&&maze[nx][ny]===1){
        maze[x+dx/2][y+dy/2]=0;
        carve(nx,ny);
      }
    }
  }

  carve(1,1);
  maze[size-2][size-2]=2;
  player={x:1,y:1};
  moveQueue=[];
  drawMaze();
}

function drawMaze(){
  const el=document.getElementById("maze");
  el.style.gridTemplateColumns=`repeat(${size},34px)`;
  el.innerHTML="";
  for(let i=0;i<size;i++){
    for(let j=0;j<size;j++){
      const c=document.createElement("div");
      c.className="cell";
      if(maze[i][j]===1) c.classList.add("wall");
      if(maze[i][j]===2){ c.classList.add("goal"); c.innerHTML="🏆"; }
      c.id=`c-${i}-${j}`;
      el.appendChild(c);
    }
  }
  drawPlayer();
}

function drawPlayer(){
  document.querySelectorAll(".player").forEach(p=>p.remove());
  const cell=document.getElementById(`c-${player.x}-${player.y}`);
  const p=document.createElement("div");
  p.className="player";
  p.textContent="😀";
  cell.appendChild(p);
}

// ===== Movement Queue (Smooth) =====
function enqueueMove(dx,dy){
  moveQueue.push({dx,dy});
  if(!moving) processQueue();
}

function processQueue(){
  if(moveQueue.length===0){ moving=false; return; }
  moving=true;

  const {dx,dy}=moveQueue.shift();
  const nx=player.x+dx, ny=player.y+dy;

  if(maze[nx][ny]===1){
    soundHit();
    processQueue();
    return;
  }

  player.x=nx; player.y=ny;
  drawPlayer();
  soundMove();

  if(maze[nx][ny]===2){
    soundWin();
    setTimeout(()=>{
      alert("🎉 WIN!");
      generateMaze();
    },200);
    return;
  }

  setTimeout(processQueue,120); // smooth speed
}

// ===== Voice Fast Mode =====
let recognition;

function initVoice(){
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR) return;

  recognition=new SR();
  recognition.lang="en-US";
  recognition.continuous=true;
  recognition.interimResults=true; // ⚡ ฟังเร็วขึ้น

  recognition.onresult=(e)=>{
    const res=e.results[e.results.length-1];
    const text=res[0].transcript.toLowerCase();

    document.getElementById("status").innerText=text;

    const cmd=parseCommand(text);
    if(cmd){
      run(cmd);
    }
  };

  recognition.onend=()=>{try{recognition.start();}catch{}};
  recognition.onerror=()=>{try{recognition.start();}catch{}};

  recognition.start();
}

// ===== Command =====
function parseCommand(t){
  if(t.includes("up")) return "up";
  if(t.includes("down")) return "down";
  if(t.includes("left")) return "left";
  if(t.includes("right")) return "right";
  return null;
}

function run(cmd){
  if(cmd==="up") enqueueMove(-1,0);
  if(cmd==="down") enqueueMove(1,0);
  if(cmd==="left") enqueueMove(0,-1);
  if(cmd==="right") enqueueMove(0,1);
}

// ===== TTS =====
function speak(text){
  const u=new SpeechSynthesisUtterance(text);
  u.lang="en-US";
  u.rate=0.9;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

// ===== Init =====
generateMaze();
initVoice();
</script>

</body>
</html>
